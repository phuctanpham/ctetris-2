<!DOCTYPE html>
<!--
    shell.html -- Emscripten shell template cho cTetris (WASM build)
    ==============================================================
    THAY DOI v3 (KHOI PHUC PWA):
      - Khoi phuc <link rel="manifest"> -> browser hien icon "Install"
        o thanh dia chi.
      - Khoi phuc service worker registration -> cho phep cai dat va
        chay offline. SW cache cTetris.html/.js/.wasm + favicon.
      - Them <meta name="apple-mobile-web-app-capable" content="yes">
        + theme-color cho iOS Safari standalone mode.
      - Them <meta name="viewport" content="...viewport-fit=cover">
        de tan dung notch area khi standalone tren mobile.
      - Khi user "Add to Home Screen" / "Install app", PWA chay full-height
        khong co address bar -> giai quyet van de mat full-height.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">

<!-- Tab title -->
<title>cTetris &copy;</title>

<!-- Favicon SVG-driven (single source-of-truth tu brandkit/logo.svg) -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<!-- PWA manifest -- browser doc file nay de hien nut "Install" -->
<link rel="manifest" href="manifest.webmanifest">

<!-- iOS Safari: bat che do standalone (full-height, an Safari UI khi launch
     tu Home Screen). Chrome/Edge dung manifest.display="standalone" thay vi
     meta tag nay, nhung iOS van can apple-mobile-web-app-* legacy meta. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cTetris">
<link rel="apple-touch-icon" href="favicon.svg">

<!-- Theme color cho address bar (Chrome mobile) va splash screen (iOS) -->
<meta name="theme-color" content="#000000">

<style>
    /* Reset co ban + chiem toan vung view (100vh + safe-area cho iOS notch) */
    html, body {
        margin: 0;
        padding: 0;
        background: #000;
        /* 100vh tren mobile bao gom address bar -- dung 100dvh (dynamic vh)
           neu browser ho tro de tu fit theo state moi cua address bar.
           Fallback 100vh cho browser cu. */
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        /* Padding theo safe-area cho iPhone notch / Dynamic Island */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
    }
    #game-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
    }
    #canvas {
        display: block;
        background: #000;
        outline: none;
        border: none;
    }
    #loading {
        color: #fff;
        font-size: 14px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
    /* Khi PWA chay che do standalone (sau khi user Install), CSS media
       query nay activate. Co the dung de tat splash screen, etc. */
    @media all and (display-mode: standalone) {
        body { background: #000; }
    }
</style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <div id="loading">Loading cTetris &copy;...</div>
    </div>

    <script>
        // ==============================================
        // Emscripten Module config (bat buoc)
        // ==============================================
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('webglcontextlost', function(e) {
                    alert('WebGL context lost. Vui long reload.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            print: function(text)    { console.log('[wasm]', text); },
            printErr: function(text) { console.error('[wasm]', text); },
            onRuntimeInitialized: function() {
                var loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
            }
        };

        // ==============================================
        // PWA: Service Worker registration
        // ==============================================
        // SW cache cTetris.html / .js / .wasm + favicon -> chay offline.
        // KHONG load tren localhost (file://) vi SW yeu cau secure context
        // (https hoac localhost). Tren GitHub Pages tu dong la https.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js')
                    .then(function(reg) {
                        console.log('[PWA] Service Worker registered:', reg.scope);
                    })
                    .catch(function(err) {
                        console.warn('[PWA] Service Worker registration fail:', err);
                    });
            });
        }
    </script>

    <!-- Emscripten chen script tag tro den cTetris.js o vi tri sau -->
    {{{ SCRIPT }}}
</body>
</html>
