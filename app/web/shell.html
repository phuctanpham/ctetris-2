<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>cTetris &copy;</title>
    
    <!-- Favicon & PWA Assets -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.ico"> <!-- Fallback cho trình duyệt cũ -->
    <link rel="manifest" href="manifest.webmanifest">
    
    <!-- Apple Mobile Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="cTetris">
    <link rel="apple-touch-icon" href="favicon.svg">
    <meta name="theme-color" content="#000000">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; height: 100dvh;
            overflow: hidden; background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        #game-container {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; background: #000;
        }
        #canvas {
            display: block; background: #000; outline: none; border: none;
            aspect-ratio: 9 / 16; height: 100%; max-height: 100dvh; max-width: 100vw;
            image-rendering: pixelated; image-rendering: crisp-edges;
        }
        #loading {
            color: #ccc; font-size: 14px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <div id="loading">Loading cTetris &copy;...</div>
    </div>

    <script>
        var GAME_RATIO = 9 / 16;
        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            if (!canvas) return;
            var availW = window.innerWidth, availH = window.innerHeight;
            var targetW = availH * GAME_RATIO;
            var w, h;
            if (targetW <= availW) { h = availH; w = targetW; }
            else { w = availW; h = availW / GAME_RATIO; }
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

        var Module = {
            canvas: document.getElementById('canvas'),
            onRuntimeInitialized: function() {
                document.getElementById('loading').style.display = 'none';
                resizeCanvas();
            }
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
                .then(reg => {
                    console.log('[PWA] Registered');
                    reg.update();
                });
            });
        }
    </script>
    {{{ SCRIPT }}}
</body>
</html>
