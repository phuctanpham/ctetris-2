<!DOCTYPE html>
<!--
    shell.html -- Emscripten shell template cho cTetris (WASM build)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>cTetris &copy;</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cTetris">
<link rel="apple-touch-icon" href="favicon.svg">
<meta name="theme-color" content="#000000">

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }

    #game-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: #000;
    }

    #canvas {
        display: block;
        background: #000;
        outline: none;
        border: none;
        aspect-ratio: 9 / 16;
        height: 100%;
        max-height: 100dvh;
        max-width: 100vw;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    #loading {
        color: #ccc;
        font-size: 14px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    @media all and (display-mode: standalone) {
        body { background: #000; }
    }
</style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <div id="loading">Loading cTetris &copy;...</div>
    </div>

    <script>
        // ==============================================================
        // resizeCanvas: giu dung ti le 9:16, fill chieu cao viewport
        // ==============================================================
        var GAME_RATIO = 9 / 16;

        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            if (!canvas) return;
            var availW = window.innerWidth;
            var availH = window.innerHeight;
            var targetW = availH * GAME_RATIO;
            var w, h;
            if (targetW <= availW) {
                h = availH; w = targetW;
            } else {
                w = availW; h = availW / GAME_RATIO;
            }
            canvas.style.width  = w + 'px';
            canvas.style.height = h + 'px';
            canvas.style.aspectRatio = 'unset';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', function() {
            setTimeout(resizeCanvas, 100);
        });

        // ==============================================================
        // Emscripten Module config
        // ==============================================================
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('webglcontextlost', function(e) {
                    alert('WebGL context lost. Vui long reload.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            print:    function(text) { console.log('[wasm]', text); },
            printErr: function(text) { console.error('[wasm]', text); },
            onRuntimeInitialized: function() {
                var loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
                resizeCanvas();
                requestAnimationFrame(resizeCanvas);
            }
        };

        // ==============================================================
        // PWA: Service Worker registration
        //
        // updateViaCache: 'none'
        //   -> browser LUON fetch sw.js tu network, KHONG dung HTTP cache
        //      cho file sw.js. Ket qua: khi deploy sw.js moi (doi
        //      CACHE_VERSION), moi browser se phat hien ra ngay lan mo
        //      tab tiep theo ma khong can xoa cache tay.
        //
        // reg.update()
        //   -> sau khi register, kick off 1 ky kiem tra update ngay lap
        //      tuc (thay vi doi den lan visit tiep theo). Gop 2 cai nay
        //      voi skipWaiting()+clients.claim() ben sw.js: returning
        //      user nhan SW moi ngay lan dau tien mo lai trang.
        // ==============================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js', {
                    updateViaCache: 'none'
                })
                .then(function(reg) {
                    console.log('[PWA] SW registered:', reg.scope);
                    reg.update();
                })
                .catch(function(err) {
                    console.warn('[PWA] SW registration fail:', err);
                });
            });
        }
    </script>

    {{{ SCRIPT }}}
</body>
</html>
