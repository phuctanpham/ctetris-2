<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#4b63b7">
<title>cTetris</title>

<!-- PWA: manifest phai relative; favicon SVG cho modern browsers + PNG fallback -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- iOS standalone PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
body { display: flex; align-items: center; justify-content: center; }

canvas.emscripten {
    aspect-ratio: 270 / 480;
    height: 100vh;
    height: 100dvh;
    max-height: 100dvh;
    max-width: 100vw;
    width: auto;
    background: #000000;
    display: block;
    outline: none;
    border: 0;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

#loading {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #e0e0e0;
    border-top-color: #4b63b7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text { color: #4b63b7; font-size: 14px; letter-spacing: 0.05em; }

/* Nut Install custom: hien thi khi browser fire 'beforeinstallprompt'.
   Mac dinh hidden; chuyen sang flex khi co prompt event. */
#install-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 20;
    padding: 8px 14px;
    background: #4b63b7;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: none;
}
#install-btn.show { display: inline-block; }
#install-btn:hover { background: #3d52a0; }
</style>
</head>
<body>

<div id="loading">
    <div id="spinner"></div>
    <div id="loading-text">Loading cTetris...</div>
</div>

<button id="install-btn" type="button">Install App</button>

<canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

<script>
// Emscripten Module config
var Module = {
    canvas: (function() {
        var c = document.getElementById('canvas');
        c.addEventListener("webglcontextlost", function(e) {
            alert('WebGL context bi mat. Hay reload trang.');
            e.preventDefault();
        }, false);
        return c;
    })(),
    onRuntimeInitialized: function() {
        var loading = document.getElementById('loading');
        if (loading) {
            loading.classList.add('hidden');
            setTimeout(function() { loading.style.display = 'none'; }, 300);
        }
    },
    print: function(t) { console.log(t); },
    printErr: function(t) { console.error(t); }
};

// PWA install prompt: bat su kien beforeinstallprompt de hien nut Install
// (dac biet huu ich tren mobile va khi browser khong tu dong show banner)
var deferredPrompt = null;
var installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('show');
});

installBtn.addEventListener('click', function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function() {
        deferredPrompt = null;
        installBtn.classList.remove('show');
    });
});

// An nut khi da install xong
window.addEventListener('appinstalled', function() {
    installBtn.classList.remove('show');
    deferredPrompt = null;
});

// Service worker: register voi scope tuong doi de hoat dong tot duoi subpath
// (vd /ctetris/ tren GitHub Pages). Chi register tren HTTPS hoac localhost.
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js', { scope: './' })
            .catch(function(err) { console.warn('SW register fail:', err); });
    });
}
</script>

{{{ SCRIPT }}}

</body>
</html>
