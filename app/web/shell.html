<!DOCTYPE html>
<!--
    shell.html -- Emscripten shell template cho cTetris (WASM build)
    ==============================================================
    THAY DOI v1:
      - Da loai bo HOAN TOAN co che PWA install:
          * Khong link <link rel="manifest" ...>
          * Khong dang ky service worker (sw.js)
          * Khong co button "Cai dat" / "Install" trong UI
          * Khong co cac the meta apple-mobile-web-app-* va apple-touch-icon
        => Browser SE KHONG hien thi icon "cai app" o thanh dia chi nua,
           dung dau yeu cau v1.
      - Favicon: chi su dung mot file SVG duy nhat (favicon.svg) duoc copy
        boi build.sh tu brandkit/logo.svg. Khong PNG fallback nua.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<!-- Tieu de tab: hau to (c) thay vi ky tu copyright vi can ASCII-safe
     trong mot so trinh duyet/font cu. Tag <title> nay HTML thoa man UTF-8
     nen dung truc tiep ky tu (c) thuong duoc -- nhung de chac, dung
     entity &copy; cho dam bao moi browser hien thi dung. -->
<title>cTetris &copy;</title>

<!-- Favicon SVG-driven: SVG don gian hon nhieu kich thuoc PNG va modern
     browser deu ho tro. Khong khai bao type=image/png nua. -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>
    /* Reset co ban + chiem toan vung view */
    html, body {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100vh;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    /* Container can giua canvas trong viewport */
    #game-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
    }
    /* Canvas Emscripten render game vao */
    #canvas {
        display: block;
        background: #000;
        outline: none;
        /* Bo border mac dinh cua canvas, cho cam giac fullscreen */
        border: none;
    }
    /* Loading text hien thi truoc khi WASM ready */
    #loading {
        color: #fff;
        font-size: 14px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
</style>
</head>
<body>
    <div id="game-container">
        <!-- Canvas thiet bi cua Emscripten -->
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <!-- Text trong khi tai WASM module -->
        <div id="loading">Loading cTetris &copy;...</div>
    </div>

    <script>
        // ==============================================
        // Emscripten Module config (bat buoc)
        // ==============================================
        // Cau hinh nay duoc Emscripten generated code doc de
        // - lay reference den canvas
        // - in log/error ra console
        // - an "loading" text khi runtime san sang
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                // Nhan focus de phim chuc nang (Esc, F5...) van duoc capture
                canvas.addEventListener('webglcontextlost', function(e) {
                    alert('WebGL context lost. Vui long reload.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            print: function(text) {
                console.log('[wasm]', text);
            },
            printErr: function(text) {
                console.error('[wasm]', text);
            },
            onRuntimeInitialized: function() {
                // An loading text khi WASM san sang
                var loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
            }
        };

        // ==============================================
        // KHONG dang ky service worker -- de browser khong
        // hien thi prompt "cai dat ung dung" o thanh dia chi
        // (yeu cau disable PWA install).
        // ==============================================
        // (Co tinh khong navigator.serviceWorker.register(...) o day)
    </script>

    <!-- Emscripten se chen script tag tro den cTetris.js o vi tri sau -->
    {{{ SCRIPT }}}
</body>
</html>
