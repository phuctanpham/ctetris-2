<!DOCTYPE html>
<!--
    shell.html -- Emscripten shell template cho cTetris (WASM build)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>cTetris &copy;</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cTetris">
<link rel="apple-touch-icon" href="favicon.svg">
<meta name="theme-color" content="#000000">

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }

    #game-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: #000;
    }

    #canvas {
        display: block;
        background: #000;
        outline: none;
        border: none;
        aspect-ratio: 9 / 16;
        height: 100%;
        max-height: 100dvh;
        max-width: 100vw;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    #loading {
        color: #ccc;
        font-size: 14px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    @media all and (display-mode: standalone) {
        body { background: #000; }
    }
</style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <div id="loading">Loading cTetris &copy;...</div>
    </div>

    <script>
        // ── Canvas resize ──────────────────────────────────────────────────────
        var GAME_RATIO = 9 / 16;

        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            if (!canvas) return;
            var availW = window.innerWidth;
            var availH = window.innerHeight;
            var targetW = availH * GAME_RATIO;
            var w, h;
            if (targetW <= availW) { h = availH; w = targetW; }
            else                   { w = availW; h = availW / GAME_RATIO; }
            canvas.style.width  = w + 'px';
            canvas.style.height = h + 'px';
            canvas.style.aspectRatio = 'unset';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', function() {
            setTimeout(resizeCanvas, 100);
        });

        // ── Debug log accumulator ──────────────────────────────────────────────
        // Collects every line printed via SDL_Log (which maps to printErr).
        // Lines tagged [HTTP_DEBUG] are highlighted but ALL lines are saved.
        var _debugLines = [];
        var _debugEnabled = false;   // flip to true for release shell.html

        function _accumulateLine(text) {
            var ts = new Date().toISOString().substring(11, 23);  // HH:MM:SS.mmm
            _debugLines.push('[' + ts + '] ' + text);
            // Mirror to DevTools as usual
            if (text.indexOf('[HTTP_DEBUG]') !== -1) {
                console.debug('%c' + text, 'color:#7ec8e3');   // teal = HTTP_DEBUG
            } else {
                console.error('[wasm]', text);
            }
        }

        function _downloadLog() {
            var blob = new Blob([_debugLines.join('\n')], { type: 'text/plain' });
            var url  = URL.createObjectURL(blob);
            var a    = document.createElement('a');
            a.href   = url;
            a.download = 'ctetris.log';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function _copyLog() {
            var text = _debugLines.join('\n');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    console.log('[debug] log copied to clipboard');
                });
            }
        }

        // ── Floating debug toolbar (only when _debugEnabled) ──────────────────
        if (_debugEnabled) {
            document.addEventListener('DOMContentLoaded', function() {
                var toolbar = document.createElement('div');
                toolbar.id  = 'dbg-toolbar';
                toolbar.style.cssText = [
                    'position:fixed',
                    'top:6px',
                    'right:6px',
                    'z-index:9999',
                    'display:flex',
                    'gap:4px',
                    'font-family:monospace',
                    'font-size:11px'
                ].join(';');

                // "Download Log" button
                var btnDl = document.createElement('button');
                btnDl.textContent = '⬇ ctetris.log';
                btnDl.style.cssText = 'background:#1a3a4a;color:#7ec8e3;border:1px solid #7ec8e3;padding:3px 7px;cursor:pointer;border-radius:3px';
                btnDl.addEventListener('click', _downloadLog);

                // "Copy Log" button
                var btnCp = document.createElement('button');
                btnCp.textContent = '⎘ Copy';
                btnCp.style.cssText = 'background:#1a3a4a;color:#b0d0a0;border:1px solid #b0d0a0;padding:3px 7px;cursor:pointer;border-radius:3px';
                btnCp.addEventListener('click', _copyLog);

                // "Clear" button
                var btnCl = document.createElement('button');
                btnCl.textContent = '✕ Clear';
                btnCl.style.cssText = 'background:#1a3a4a;color:#d08080;border:1px solid #d08080;padding:3px 7px;cursor:pointer;border-radius:3px';
                btnCl.addEventListener('click', function() { _debugLines = []; });

                toolbar.appendChild(btnDl);
                toolbar.appendChild(btnCp);
                toolbar.appendChild(btnCl);
                document.body.appendChild(toolbar);
            });
        }

        // ── Emscripten Module config ───────────────────────────────────────────
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('webglcontextlost', function(e) {
                    alert('WebGL context lost. Vui long reload.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),

            print: function(text) {
                if (_debugEnabled) _accumulateLine(text);
                else console.log('[wasm]', text);
            },

            // SDL_Log() → printErr → this handler
            printErr: function(text) {
                if (_debugEnabled) _accumulateLine(text);
                else console.error('[wasm]', text);
            },

            onRuntimeInitialized: function() {
                var loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
                resizeCanvas();
                requestAnimationFrame(resizeCanvas);
                if (_debugEnabled)
                    _accumulateLine('[SHELL] cTetris WASM runtime ready');
            }
        };

        // ── PWA Service Worker ─────────────────────────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
                .then(function(reg) {
                    console.log('[PWA] SW registered:', reg.scope);
                    reg.update();
                })
                .catch(function(err) {
                    console.warn('[PWA] SW registration fail:', err);
                });
            });
        }
    </script>

    {{{ SCRIPT }}}
</body>
</html>
