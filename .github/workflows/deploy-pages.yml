# =============================================================================
# .github/workflows/deploy-pages.yml
# Workflow build cTetris (WASM) + deploy len GitHub Pages
# =============================================================================
# Triet ly v3 (full pre-install + verify):
#   - Workflow PRE-INSTALL day du tat ca dependencies cho WASM build:
#       * APT packages (compiler, cmake, etc.)
#       * SDL3 dev libs (libsdl3-dev neu Ubuntu 24.04+ co, fallback build source)
#       * EMSDK (uu tien setup-emsdk action, fallback git clone neu fail)
#   - Sau do build.sh chay -- script PHAI detect tat ca da co va SKIP install.
#   - Step "Verify build.sh detection" sau khi build se grep log:
#       * KHONG duoc thay "Khong tim thay emsdk, clone vao..."
#       * KHONG duoc thay "Thieu N/M apt packages"
#       * KHONG duoc thay "Cache MISS" cho SDL3 (lan build #2 tro di)
#     Neu thay -> FAIL workflow voi error message ro rang.
#
# Yeu cau cau hinh repo (mot lan):
#   Settings > Pages > Source = "GitHub Actions"
#   Settings > Actions > General > Workflow permissions = "Read and write"
# =============================================================================

name: Deploy cTetris to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Version pinning -- match voi build.sh de detection logic khop
env:
  EMSDK_VERSION: '3.1.72'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: BUILD
  # ---------------------------------------------------------------------------
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------
      # Step 1: Checkout source code
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------

      # -----------------------------------------------------------------
      # Step 2: Cache OS-driven downloads (libs/ubuntu/downloads/) for build.sh
      # -----------------------------------------------------------------
      - name: Cache OS-driven downloads (libs/ubuntu/downloads/)
        uses: actions/cache@v4
        with:
          path: app/libs/ubuntu/downloads
          key: libs-ubuntu-${{ hashFiles('app/build.sh') }}-${{ runner.os }}
          restore-keys: |
            libs-ubuntu-

      # -----------------------------------------------------------------

      # -----------------------------------------------------------------
      # Step 3: Run build.sh for WASM (all logic handled by build.sh)
      # -----------------------------------------------------------------
      - name: Build WASM (all logic in build.sh)
        working-directory: app
        run: |
          set -o pipefail
          chmod +x build.sh
          ./build.sh wasm 2>&1 | tee build.log

      # -----------------------------------------------------------------

      # -----------------------------------------------------------------
      # Step 4: (Optional) Upload build.log for debugging
      # -----------------------------------------------------------------
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          retention-days: 7

      # -----------------------------------------------------------------
      # Step 9: Stage Pages artifact (rename cTetris.html -> index.html,
      # touch .nojekyll de Pages khong loai bo cTetris.wasm)
      # -----------------------------------------------------------------
      - name: Stage Pages artifact
        run: |
          mkdir -p public
          cp app/build/wasm/ubuntu/cTetris.html  public/index.html
          cp app/build/wasm/ubuntu/cTetris.js    public/
          cp app/build/wasm/ubuntu/cTetris.wasm  public/
          if [ -f app/build/wasm/ubuntu/favicon.svg ]; then
            cp app/build/wasm/ubuntu/favicon.svg public/
          fi
          touch public/.nojekyll
          ls -la public/

      # -----------------------------------------------------------------
      # Step 10: Upload Pages artifact
      # -----------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # -----------------------------------------------------------------
      # Step 11: Upload build.log lam artifact rieng (debug). Always run.
      # -----------------------------------------------------------------
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: DEPLOY
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4