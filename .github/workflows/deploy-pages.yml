name: Deploy WASM to GitHub Pages

on:
  push:
    branches:
      - main
      - phucpt/github-pages
    paths:
      - 'app/src/**'
      - 'app/main.cpp'
      - 'app/web/**'
      - 'app/brandkit/**'
      - 'app/CMakeLists.txt'
      - 'app/build.sh'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# ✅ Opt into Node.js 24 for all jobs before June 2 deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: BUILD
  # ---------------------------------------------------------------------------
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------
      # Step 1: Checkout source code
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------

      # Cache only heavy downloads for build.sh (libs/ubuntu/downloads/)
      - name: Cache heavy downloads (libs/ubuntu/downloads/)
        uses: actions/cache@v4
        with:
          path: app/libs/ubuntu/downloads
          key: libs-ubuntu-${{ hashFiles('app/build.sh') }}-${{ runner.os }}
          restore-keys: |
            libs-ubuntu-

      # Build WASM (all logic in build.sh, including dependency git clone and artifact generation)
      - name: Build WASM
        working-directory: app
        run: |
          set -o pipefail
          chmod +x build.sh
          ./build.sh wasm 2>&1 | tee build.log

      # Upload build log for debugging
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          retention-days: 7

      # Stage Pages artifact
      # build.sh da copy favicon.svg, manifest.webmanifest, sw.js vao BUILD_WASM_DIR
      # chi can stage toan bo vao public/ de deploy
      - name: Stage Pages artifact
        run: |
          mkdir -p public
          cp app/build/wasm/ubuntu/cTetris.html  public/index.html
          cp app/build/wasm/ubuntu/cTetris.js    public/
          cp app/build/wasm/ubuntu/cTetris.wasm  public/
          # Static assets -- copy neu ton tai (build.sh da copy tu web/ va brandkit/)
          for asset in favicon.svg manifest.webmanifest sw.js; do
            if [ -f "app/build/wasm/ubuntu/$asset" ]; then
              cp "app/build/wasm/ubuntu/$asset" "public/$asset"
            else
              echo "[WARN] $asset khong co trong build output -- PWA co the bi anh huong"
            fi
          done
          touch public/.nojekyll
          echo "--- Kiem tra noi dung public/ ---"
          ls -la public/

      # Upload Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # ---------------------------------------------------------------------------
  # Job 2: DEPLOY GITHUB PAGES
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      actions: write        # ✅ required to list + delete artifacts
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cleanup workflow artifacts (except cache)
        if: ${{ success() }}
        run: |
          echo "Cleaning up workflow artifacts except cache..."
          ids=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --paginate -q '.artifacts[] | select(.expired==false) | select(.name | test("^cache") | not) | .id' 2>/dev/null || true)

          if [ -z "$ids" ]; then
            echo "No artifacts to delete."
            exit 0
          fi

          echo "$ids" | xargs -r -I{} gh api --method DELETE \
            "repos/${{ github.repository }}/actions/artifacts/{}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}