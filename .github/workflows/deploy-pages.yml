# =============================================================================
# .github/workflows/deploy-pages.yml
# Workflow build cTetris (WASM) + deploy len GitHub Pages
# =============================================================================
# Triet ly v2 (verification approach):
#   - Workflow PRE-INSTALL day du tat ca packages can thiet truoc khi goi
#     build.sh. Day la "ground truth" cua moi truong CI.
#   - Sau do build.sh chay -- script PHAI detect tat ca packages da co va
#     SKIP cac install step. Cu the:
#       Mong doi: [OK] Tat ca N apt packages da co
#       Khong duoc: [INFO] Thieu N/M apt packages
#   - Step "Verify build.sh detection" sau khi build se grep log -- neu thay
#     "Thieu .* apt packages" thi FAIL workflow voi error message ro rang.
#     Day la guard tu dong: phat hien khi function `is_apt_pkg_installed`
#     bi loi ma chua kip notice o local.
#
# Yeu cau cau hinh repo (mot lan):
#   Settings > Pages > Source = "GitHub Actions"
#   Settings > Actions > General > Workflow permissions = "Read and write"
# =============================================================================

name: Deploy cTetris to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: BUILD
  # ---------------------------------------------------------------------------
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------
      # Step 1: Checkout source code
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Step 2: PRE-INSTALL toan bo packages can thiet cho WASM build.
      # Danh sach nay PHAI khop chinh xac voi danh sach trong
      # ensure_basic_tools()/ubuntu cua build.sh -- de script detect duoc
      # day du va skip install. Neu khong khop, script se chay apt-get
      # install dac thua va workflow phat hien o step Verify cuoi cung.
      # -----------------------------------------------------------------
      - name: Pre-install required apt packages (CI ground truth)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            curl \
            python3 \
            ca-certificates \
            pkg-config

      # -----------------------------------------------------------------
      # Step 3: Cache toan bo libs/ubuntu/downloads/ -- bao gom emsdk,
      # SDL3 source clone, SDL3 WASM static install, va nanosvg headers.
      # Cache key bind theo build.sh (de doi version pinning thi tu invalidate)
      # va theo runner OS.
      # -----------------------------------------------------------------
      - name: Cache OS-driven downloads (libs/ubuntu/downloads/)
        uses: actions/cache@v4
        with:
          path: app/libs/ubuntu/downloads
          key: libs-ubuntu-${{ hashFiles('app/build.sh') }}-${{ runner.os }}
          restore-keys: |
            libs-ubuntu-

      # -----------------------------------------------------------------
      # Step 4: Run build.sh wasm + capture log de verify o step sau.
      # Quan trong: chay voi `set -o pipefail` de exit code cua build.sh
      # khong bi che bo tee -- neu build fail, workflow van fail.
      # -----------------------------------------------------------------
      - name: Build WASM (script should DETECT all installed packages)
        working-directory: app
        run: |
          set -o pipefail
          chmod +x build.sh
          ./build.sh wasm 2>&1 | tee build.log

      # -----------------------------------------------------------------
      # Step 5: Stage Pages artifact
      # Build artifact nam o app/build/wasm/ubuntu/ (OS-driven path).
      #   - Rename cTetris.html -> index.html
      #   - Copy .js / .wasm / favicon.svg
      #   - Tao .nojekyll
      # -----------------------------------------------------------------
      - name: Stage Pages artifact
        run: |
          mkdir -p public
          cp app/build/wasm/ubuntu/cTetris.html  public/index.html
          cp app/build/wasm/ubuntu/cTetris.js    public/
          cp app/build/wasm/ubuntu/cTetris.wasm  public/
          if [ -f app/build/wasm/ubuntu/favicon.svg ]; then
            cp app/build/wasm/ubuntu/favicon.svg public/
          fi
          touch public/.nojekyll
          ls -la public/

      # -----------------------------------------------------------------
      # Step 6: Upload Pages artifact
      # -----------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # -----------------------------------------------------------------
      # Step 7: Upload build.log la artifact rieng -- de debug khi can.
      # Always run, ke ca khi cac step truoc fail.
      # -----------------------------------------------------------------
      - name: Upload build log (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: DEPLOY
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4