name: Deploy WASM to GitHub Pages

on:
  push:
    branches:
      - main
      - phucpt/github-pages
    paths:
      - 'app/src/**'
      - 'app/main.cpp'
      - 'app/web/**'
      - 'app/brandkit/**'
      - 'app/CMakeLists.txt'
      - 'app/build.ps1'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: BUILD
  # ---------------------------------------------------------------------------
  build:
    name: Build WASM
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache heavy downloads (windows path)
      - name: Cache heavy downloads (libs/windows/downloads/)
        uses: actions/cache@v4
        with:
          path: app/libs/windows/downloads
          key: libs-windows-${{ hashFiles('app/build.ps1') }}-${{ runner.os }}
          restore-keys: |
            libs-windows-

      # Build WASM via PowerShell script
      - name: Build WASM
        working-directory: app
        shell: pwsh
        run: |
          .\build.ps1 wasm 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Upload build log for debugging
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          retention-days: 7

      # Stage Pages artifact
      - name: Stage Pages artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path public | Out-Null
          $src = "app/build/wasm/windows"
          Copy-Item "$src/cTetris.html" "public/index.html"
          Copy-Item "$src/cTetris.js"   "public/"
          Copy-Item "$src/cTetris.wasm" "public/"
          # Static assets -- copy neu ton tai
          foreach ($asset in @("favicon.svg","favicon.ico","manifest.webmanifest","sw.js")) {
            $f = "$src/$asset"
            if (Test-Path $f) {
              Copy-Item $f "public/"
              Write-Host "[OK] $asset"
            } else {
              Write-Warning "$asset khong co trong build output -- PWA co the bi anh huong"
            }
          }
          New-Item -ItemType File -Force -Path "public/.nojekyll" | Out-Null
          Write-Host "--- Kiem tra noi dung public/ ---"
          Get-ChildItem public/

      # Upload Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # ---------------------------------------------------------------------------
  # Job 2: DEPLOY GITHUB PAGES
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest   # deploy-pages action chi chay tren ubuntu
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      actions: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cleanup workflow artifacts (except cache)
        if: ${{ success() }}
        shell: bash
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --paginate -q '.artifacts[] | select(.expired==false) | select(.name | test("^cache") | not) | .id' 2>/dev/null || true)
          if [ -z "$ids" ]; then
            echo "No artifacts to delete."
            exit 0
          fi
          echo "$ids" | xargs -r -I{} gh api --method DELETE \
            "repos/${{ github.repository }}/actions/artifacts/{}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}