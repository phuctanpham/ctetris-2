name: Deploy WASM to GitHub Pages

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'app/src/**'
      - 'app/main.cpp'
      - 'app/web/**'
      - 'app/brandkit/**'
      - 'app/CMakeLists.txt'
      - 'app/build.sh'
      - 'app/build.ps1'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_OS: macos   # ← Change to: 'ubuntu' | 'windows' | 'macos'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write    # ← Added to allow the cleanup step to delete artifacts

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: CONFIG  
  # ---------------------------------------------------------------------------
  config:
    name: Resolve runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        shell: bash
        run: |
          if [ "${{ env.BUILD_OS }}" = "windows" ]; then
            echo "runner=windows-latest" >> $GITHUB_OUTPUT
          elif [ "${{ env.BUILD_OS }}" = "macos" ]; then
            echo "runner=macos-latest" >> $GITHUB_OUTPUT
          else
            echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Job 1: BUILD & UPLOAD
  # ---------------------------------------------------------------------------
  build:
    name: Build WASM
    needs: config
    runs-on: ${{ needs.config.outputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache heavy downloads
        uses: actions/cache@v4
        with:
          path: app/libs/${{ env.BUILD_OS }}/downloads
          key: libs-${{ env.BUILD_OS }}-${{ hashFiles('app/build.sh', 'app/build.ps1') }}-${{ runner.os }}
          restore-keys: |
            libs-${{ env.BUILD_OS }}-

      # ---------- OS-Specific Setup ----------
      - name: Install build tools (Ubuntu)
        if: env.BUILD_OS == 'ubuntu'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: env.BUILD_OS == 'macos'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: env.BUILD_OS == 'windows'
        shell: pwsh
        run: choco install ninja -y --no-progress

      # ===================================================================
      # Build WASM -- Unix (Ubuntu & macOS)
      # ===================================================================
      - name: Build WASM (Unix)
        if: env.BUILD_OS == 'ubuntu' || env.BUILD_OS == 'macos'
        working-directory: app
        shell: bash
        run: |
          EMSDK_DIR="libs/${{ env.BUILD_OS }}/downloads/emsdk"
          mkdir -p "libs/${{ env.BUILD_OS }}/downloads"
          [ -d "$EMSDK_DIR" ] || git clone https://github.com/emscripten-core/emsdk.git "$EMSDK_DIR"
          (cd "$EMSDK_DIR" && ./emsdk install 3.1.72 && ./emsdk activate 3.1.72)
          source "$EMSDK_DIR/emsdk_env.sh"
          bash build.sh wasm 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      # ===================================================================
      # Build WASM -- Windows
      # ===================================================================
      - name: Build WASM (Windows)
        if: env.BUILD_OS == 'windows'
        working-directory: app
        shell: pwsh
        run: |
          .\build.ps1 wasm 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Upload build log for debugging
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          retention-days: 7

      # Stage Pages artifact
      - name: Stage Pages artifact
        shell: bash
        run: |
          mkdir -p public
          src="app/build/wasm/${{ env.BUILD_OS }}"
          cp "$src/cTetris.html" public/index.html
          cp "$src/cTetris.js"   public/
          cp "$src/cTetris.wasm" public/
          for asset in favicon.svg favicon.ico manifest.webmanifest sw.js; do
            if [ -f "$src/$asset" ]; then
              cp "$src/$asset" "public/$asset"
              echo "[OK] $asset"
            else
              echo "[WARN] $asset not in build output -- PWA may be affected"
            fi
          done
          touch public/.nojekyll
          echo "--- public/ contents ---"
          ls -la public/

      # --- PAGES SETUP & UPLOAD ---
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # ---------------------------------------------------------------------------
  # Job 2: DEPLOY GITHUB PAGES
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: [config, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cleanup workflow artifacts (except cache)
        if: ${{ success() }}
        shell: bash
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --paginate -q '.artifacts[] | select(.expired==false) | select(.name | test("^cache") | not) | .id' 2>/dev/null || true)
          if [ -z "$ids" ]; then
            echo "No artifacts to delete."
            exit 0
          fi
          echo "$ids" | xargs -r -I{} gh api --method DELETE \
            "repos/${{ github.repository }}/actions/artifacts/{}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}