# =============================================================================
# .github/workflows/deploy-pages.yml
# Workflow build cTetris (WASM) + deploy len GitHub Pages
# =============================================================================
# Quy trinh:
#   1. Trigger khi push len main hoac chay thu cong (workflow_dispatch).
#   2. Job "build" : cai emsdk -> build WASM -> chuan bi artifact (rename
#      cTetris.html -> index.html, them .nojekyll, copy favicon.svg).
#   3. Job "deploy": dung action chinh thuc cua GitHub de deploy artifact
#      ra environment github-pages.
#
# Yeu cau cau hinh repo (mot lan):
#   Settings > Pages > Source = "GitHub Actions" (KHONG dung gh-pages branch).
#   Settings > Actions > General > Workflow permissions = "Read and write".
# =============================================================================

name: Deploy cTetris to GitHub Pages

# Trigger: push len main + cho phep run thu cong
on:
  push:
    branches: [main]
  workflow_dispatch:

# Quyen: pages:write + id-token:write la BAT BUOC cho actions/deploy-pages.
# contents:read de checkout source.
permissions:
  contents: read
  pages: write
  id-token: write

# Chi cho phep 1 deployment chay tai 1 thoi diem. Neu co commit moi keo
# vao trong khi job dang chay, GitHub se huy job cu va chay job moi.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: BUILD
  # ---------------------------------------------------------------------------
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------
      # Step 1: Checkout source code
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Step 2: Cai system dependencies cho compile (cmake, git, curl,
      # python3 -- emsdk can python). KHONG can SDL3 dev libs vi WASM
      # build dung emscripten port -sUSE_SDL=3, khong link SDL3 he thong.
      # -----------------------------------------------------------------
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git curl python3 ca-certificates

      # -----------------------------------------------------------------
      # Step 3: Cache thu muc .emsdk de khong phai download lai 200MB+
      # moi lan run. Cache key co bao gom version emsdk -- neu doi version
      # trong build.sh thi cache se invalid va emsdk se tai lai.
      # -----------------------------------------------------------------
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: app/.emsdk
          key: emsdk-3.1.72-${{ runner.os }}
          restore-keys: |
            emsdk-3.1.72-

      # -----------------------------------------------------------------
      # Step 4: Cache nanosvg headers (chi 2 file ~150KB nhung tranh
      # phu thuoc vao network khi github raw bi rate-limit).
      # -----------------------------------------------------------------
      - name: Cache nanosvg headers
        uses: actions/cache@v4
        with:
          path: |
            app/src/gameStory/include/nanosvg.h
            app/src/gameStory/include/nanosvgrast.h
          key: nanosvg-master-${{ hashFiles('app/build.sh') }}

      # -----------------------------------------------------------------
      # Step 5: Lam cho build.sh executable (git tren Windows hay strip
      # exec bit). Sau do chay build WASM.
      # -----------------------------------------------------------------
      - name: Build WASM via build.sh
        working-directory: app
        run: |
          chmod +x build.sh
          ./build.sh wasm

      # -----------------------------------------------------------------
      # Step 6: Chuan bi thu muc public/ chua artifact se deploy.
      #   - Rename cTetris.html -> index.html (GitHub Pages mac dinh
      #     phuc vu file index.html khi access dang root URL).
      #   - Copy cac file Emscripten dau ra: .js, .wasm, favicon.svg
      #   - Tao .nojekyll de Pages KHONG chay Jekyll (Jekyll bo qua
      #     file/folder bat dau bang dau gach duoi -- co the lam mat
      #     mot so asset cua Emscripten).
      # -----------------------------------------------------------------
      - name: Stage Pages artifact
        run: |
          mkdir -p public
          cp app/build/wasm/cTetris.html  public/index.html
          cp app/build/wasm/cTetris.js    public/
          cp app/build/wasm/cTetris.wasm  public/
          # favicon.svg duoc build.sh copy tu brandkit/logo.svg
          if [ -f app/build/wasm/favicon.svg ]; then
            cp app/build/wasm/favicon.svg public/
          fi
          # .nojekyll: ngan GitHub Pages chay Jekyll trong rendered output
          touch public/.nojekyll
          # Liet ke artifact de dieu tra debug khi cac step sau fail
          ls -la public/

      # -----------------------------------------------------------------
      # Step 7: Upload thu muc public/ thanh artifact "github-pages".
      # actions/deploy-pages o job sau chi accept dung ten artifact nay.
      # -----------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # ---------------------------------------------------------------------------
  # Job 2: DEPLOY
  # ---------------------------------------------------------------------------
  # Tach rieng ra de neu deploy fail thi build artifact van con (debug).
  # Phu thuoc vao job build hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Khai bao environment github-pages -- bat buoc de actions/deploy-pages
    # co the tac dong vao Pages config va xuat ra page_url cua deployment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4