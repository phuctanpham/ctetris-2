name: Sync chapters to Gist

on:
  push:
    branches: [main, test]
    paths: ['chapters/src/**/*.json', '.github/workflows/sync-chapters.yml']
  workflow_dispatch:

permissions:
  contents: read   # read-only — never commits to repo

concurrency:
  group: sync-chapters-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # ── 0. Read manifest Gist URL + extract ID from app/.env ──────────────
      - name: Read manifest Gist config
        id: cfg
        run: |
          set -euo pipefail
          [ -z "$GIST_TOKEN" ] && { echo "::error::GIST_TOKEN secret not set"; exit 1; }
          url=$(grep '^MANIFEST_GIST_URL=' app/.env | cut -d'=' -f2- | tr -d '[:space:]')
          [ -z "$url" ] && { echo "::error::MANIFEST_GIST_URL not set in app/.env"; exit 1; }
          # Extract ID: https://gist.githubusercontent.com/{owner}/{ID}/raw/...
          mid=$(echo "$url" | awk -F'/' '{print $5}')
          [ -z "$mid" ] && { echo "::error::Cannot parse Gist ID from $url"; exit 1; }
          echo "manifest_url=$url"     >> "$GITHUB_OUTPUT"
          echo "manifest_id=$mid"      >> "$GITHUB_OUTPUT"
          echo "owner=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          echo "repo=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          echo "Manifest Gist ID: $mid"

      # ── 1. Validate changed JSON files ────────────────────────────────────
      - name: Validate chapter JSON files
        run: |
          set -euo pipefail
          fail=false
          for f in $(find chapters/src -maxdepth 2 -name "c*.json" \
                     | grep -E 'chapters/src/c[0-9]+/c[0-9]+\.json' | sort); do
            jq 'has("shared_data")' "$f" > /dev/null 2>&1 || { echo "::error::$f invalid"; fail=true; }
          done
          [ "$fail" = false ] || exit 1

      # ── 2. Helper: find or create Gist by filename ────────────────────────
      #    Writes gist_id to /tmp/gist_{filename}.id
      - name: Upsert chapter Gists
        run: |
          set -euo pipefail
          owner="${{ steps.cfg.outputs.owner }}"
          repo="${{ steps.cfg.outputs.repo }}"

          find_or_create() {
            local fname="$1"
            local content="$2"
            local gid
            # List gists (up to 100), find by filename
            gid=$(curl -sf -H "Authorization: token $GIST_TOKEN" \
              "https://api.github.com/gists?per_page=100" \
              | jq -r --arg fn "$fname" \
                '.[] | select(.files | has($fn)) | .id' | head -1 || true)
            if [ -z "$gid" ]; then
              # Create new secret Gist
              gid=$(curl -sf -X POST \
                -H "Authorization: token $GIST_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                -d "$(jq -n --arg fn "$fname" --arg fc "$content" \
                      '{"public":false,"files":{($fn):{"content":$fc}}}')" \
                "https://api.github.com/gists" | jq -r '.id')
              echo "Created Gist for $fname: $gid"
            fi
            echo "$gid"
          }

          for jsonfile in $(find chapters/src -maxdepth 2 -name "c*.json" \
                           | grep -E 'chapters/src/c[0-9]+/c[0-9]+\.json' | sort); do
            chapter_id=$(basename "$(dirname "$jsonfile")")
            fname="${chapter_id}.json"
            content=$(cat "$jsonfile")
            gid=$(find_or_create "$fname" "$content")
            # PATCH content
            http=$(curl -sf -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "$(jq -n --arg fn "$fname" --arg fc "$content" \
                    '{"files":{($fn):{"content":$fc}}}')" \
              "https://api.github.com/gists/$gid")
            [ "$http" = "200" ] || { echo "::error::PATCH $fname HTTP $http"; exit 1; }
            # Store for manifest step
            echo "$gid" > "/tmp/gist_${chapter_id}.id"
            echo "OK $chapter_id → $gid"
          done

      # ── 3. Rebuild versioned manifest Gist ────────────────────────────────
      - name: Rebuild manifest Gist
        run: |
          set -euo pipefail
          mid="${{ steps.cfg.outputs.manifest_id }}"
          owner="${{ steps.cfg.outputs.owner }}"
          repo="${{ steps.cfg.outputs.repo }}"
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Fetch current manifest content (may be empty on first run)
          current=$(curl -sf \
            -H "Authorization: token $GIST_TOKEN" \
            "https://api.github.com/gists/$mid" \
            | jq -r '.files["manifest.json"].content // "{}"')

          # Parse latest version → vXX.YY
          latest=$(echo "$current" | jq -r '.latest // ""')
          if [ -z "$latest" ]; then
            old_xx=0; old_yy=0
          else
            old_xx=$((10#${latest:1:2}))
            old_yy=$((10#${latest:4:2}))
          fi

          # Count current chapters in repo
          chapter_count=$(find chapters/src -maxdepth 2 -name "c*.json" \
            | grep -cE 'chapters/src/c[0-9]+/c[0-9]+\.json' || echo 0)

          # Compute new vXX.YY
          if [ "$chapter_count" -gt "$old_xx" ]; then
            new_xx=$chapter_count; new_yy=1
          else
            new_xx=$old_xx; new_yy=$((old_yy + 1))
          fi
          new_ver=$(printf "v%02d.%02d" $new_xx $new_yy)
          echo "New version: $new_ver"

          # Build new version entry object
          ver_entry="{}"
          for jsonfile in $(find chapters/src -maxdepth 2 -name "c*.json" \
                           | grep -E 'chapters/src/c[0-9]+/c[0-9]+\.json' | sort); do
            chapter_id=$(basename "$(dirname "$jsonfile")")
            sha=$(git log -1 --format=%H -- "$jsonfile" 2>/dev/null || echo "uncommitted")
            gid=$(cat "/tmp/gist_${chapter_id}.id" 2>/dev/null || echo "")
            gist_url="https://gist.githubusercontent.com/${owner}/${gid}/raw/${chapter_id}.json"
            media_url="https://raw.githubusercontent.com/${owner}/${repo}/main/chapters/src/${chapter_id}/media/"
            ver_entry=$(echo "$ver_entry" | jq \
              --arg cid "$chapter_id" \
              --arg sha "$sha" \
              --arg gu  "$gist_url" \
              --arg mu  "$media_url" \
              --arg dt  "$now" \
              '.[$cid] = {latestCommitId:$sha, gistUrl:$gu, mediaBaseUrl:$mu, updatedDate:$dt}')
          done

          # Append new version to manifest (preserve old versions)
          new_manifest=$(echo "$current" | jq \
            --arg note "AUTO-GENERATED by sync-chapters.yml. Do not store in repo." \
            --arg ver  "$new_ver" \
            --argjson entry "$ver_entry" \
            '._note=$note | .latest=$ver | .[$ver]=$entry')

          http=$(curl -sf -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "$(jq -n --arg mc "$new_manifest" \
                  '{"files":{"manifest.json":{"content":$mc}}}')" \
            "https://api.github.com/gists/$mid")
          [ "$http" = "200" ] || { echo "::error::Manifest PATCH HTTP $http"; exit 1; }
          echo "OK manifest $new_ver"
          echo "$new_manifest" | jq .

      # ── 4. Echo manifest Gist URL for copy-paste into app/.env ───────────
      # Uses github.repository_owner (always available) + reads Gist ID
      # directly from app/.env — never depends on step outputs that may be
      # empty when an earlier step fails (e.g. missing GIST_TOKEN secret).
      - name: Echo manifest Gist URL
        if: always()
        run: |
          owner="${{ github.repository_owner }}"
          env_url=$(grep '^MANIFEST_GIST_URL=' app/.env 2>/dev/null \
                    | cut -d'=' -f2- | tr -d '[:space:]' || true)
          mid=$(echo "$env_url" | awk -F'/' '{print $5}' || true)

          if [ -n "$mid" ] && ! echo "$mid" | grep -qE '^GIST_ID$|^<'; then
            url="https://gist.githubusercontent.com/${owner}/${mid}/raw/manifest.json"
          else
            url="NOT SET — add GIST_TOKEN secret, then re-run this workflow"
          fi

          echo ""
          echo "=============================================="
          echo "Copy this line into app/.env:"
          echo ""
          echo "MANIFEST_GIST_URL=${url}"
          echo ""
          echo "=============================================="
          echo "::notice title=MANIFEST_GIST_URL::MANIFEST_GIST_URL=${url}"
